<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register – SmartHire</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <div class="page">
    <!-- HEADER (back to home + login) -->
    <header class="header">
      <a href="index.html" class="logo" style="text-decoration:none;color:aliceblue">
        SmartHire <span>- AI JOB PORTAL</span>
      </a>
      <nav class="nav">
        <a href="login.html" class="nav-link">Sign In</a>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="main auth-main">
      <section class="auth-container">
        <div class="auth-card">
          <h1 class="auth-title">Create an account</h1>
          <p class="auth-subtitle">Register to start applying for jobs.</p>

          <!-- IMPORTANT: enctype for file upload -->
          <form id="registerForm" class="auth-form" enctype="multipart/form-data">
            <div class="form-group">
              <label for="regName">Full Name</label>
              <input type="text" id="regName" name="name" required />
            </div>

            <div class="form-group">
              <label for="regEmail">Email</label>
              <input type="email" id="regEmail" name="email" required />
            </div>

            <div class="form-group">
              <label for="regPhone">Phone</label>
              <input type="tel" id="regPhone" name="phone" required />
            </div>

            <div class="form-group">
              <label for="regPassword">Password</label>
              <input type="password" id="regPassword" name="password" required />
            </div>

            <div class="form-group">
              <label for="regRole">Role</label>
              <select id="regRole" name="role">
                <option value="seeker">Job Seeker</option>
                <option value="employer">Employer</option>
              </select>
            </div>

            <!-- NEW: Resume upload for ATS analysis -->
            <div class="form-group">
              <label for="regResume">Upload Resume (PDF / DOCX)</label>
              <input
                type="file"
                id="regResume"
                name="resume"
                accept=".pdf,.doc,.docx,.txt"
                required
              />
            </div>

            <button type="submit" class="btn-primary auth-btn">
              Register
            </button>

            <p class="auth-footer-text">
              Already have an account?
              <a href="login.html" class="link-inline">Sign in</a>
            </p>

            <p id="registerMessage" class="auth-message"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      © 2025 SmartHire. All rights reserved.
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
